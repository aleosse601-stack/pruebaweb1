<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<main class="dashboard-page">
<div class="container dashboard-layout">

<aside class="sidebar">
<h3>Admin</h3>
<nav>
<a class="menu-link active">Panel</a>
<a class="menu-link">Eventos</a>
<a class="menu-link">Usuarios</a>
<a class="menu-link">Comunicados</a>
<a class="menu-link">Formularios</a>
</nav>
</aside>

<section class="dashboard-content">

<div class="dashboard-header">
<div>
<p class="dashboard-subtitle">Panel</p>
<h2>Administración</h2>
</div>
<span class="user-badge">Admin</span>
</div>

<div class="info-grid">
<div class="info-card"><span class="info-label">Eventos</span><h3 id="totalEventos">0</h3></div>
<div class="info-card"><span class="info-label">Usuarios</span><h3 id="totalUsuarios">0</h3></div>
<div class="info-card"><span class="info-label">Movimientos</span><h3>Activo</h3></div>
</div>

<div class="content-block">
<h3>Crear evento</h3>
<form id="eventoForm" class="admin-form">
<input id="eventoTitulo" placeholder="Título">
<input id="eventoFecha" type="date">
<input id="eventoHora" type="time">
<input id="eventoLugar" placeholder="Lugar">
<button class="btn btn-primary">Crear</button>
</form>
<table><tbody id="eventosLista"></tbody></table>
</div>

<div class="content-block">
<h3>Usuarios</h3>
<form id="usuarioForm" class="admin-form">
<input id="usuarioNombre" placeholder="Nombre">
<select id="usuarioRol"><option value="fallero">Fallero</option><option value="admin">Admin</option></select>
<input id="usuarioSaldo" placeholder="Saldo">
<button class="btn btn-primary">Añadir</button>
</form>
<table><tbody id="usuariosLista"></tbody></table>
</div>

<div class="content-block">
<h3>Comunicados</h3>
<form id="comunicadoForm" class="admin-form">
<input id="comunicadoTitulo" placeholder="Título">
<input id="comunicadoTexto" placeholder="Texto">
<button class="btn btn-primary">Publicar</button>
</form>
<div id="comunicadosLista"></div>
</div>

<div class="content-block">
<h3>Formularios</h3>
<form id="formularioForm" class="admin-form">
<input id="formularioTitulo" placeholder="Título formulario">
<button class="btn btn-primary">Crear</button>
</form>
<div id="formulariosLista"></div>
</div>

<div class="content-block">
<h3>Movimientos</h3>
<table><tbody id="movimientosLista"></tbody></table>
</div>

</section>
</div>
</main>

<script src="js/admin.js"></script>
</body>
</html>
