<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso | Falla Pobla del Duc Benipeixcar</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <main class="login-page">
    <div class="container login-wrapper">

      <section class="login-info">
        <div class="login-brand">
          <img src="assets/img/logo.png" alt="Logo" class="login-logo">
          <div>
            <p class="brand-mini">Acceso</p>
            <h1>FALLA APP</h1>
          </div>
        </div>
      </section>

      <section class="login-card">
        <form class="login-form" id="loginForm">
          <select id="tipoUsuario">
            <option value="fallero">Fallero</option>
            <option value="admin">Admin</option>
          </select>

          <input type="text" id="usuario" placeholder="Usuario">
          <input type="password" id="password" placeholder="Contraseña">

          <p id="loginMessage"></p>
          <button type="submit">Entrar</button>
        </form>
      </section>

    </div>
  </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js?v=99"></script>
<script src="js/app.js?v=99"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
}
</script>
</body>
</html>
