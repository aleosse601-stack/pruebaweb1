<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso | Falla Pobla del Duc Benipeixcar</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <main class="login-page">
    <div class="container login-wrapper">

      <section class="login-info">
        <div class="login-brand">
          <img src="assets/img/logo.png" alt="Logo de la Falla Pobla del Duc Benipeixcar" class="login-logo">
          <div>
            <p class="brand-mini">Acceso a la plataforma</p>
            <h1>FALLA POBLA DEL DUC BENIPEIXCAR</h1>
          </div>
        </div>

        <div class="login-text-box">
          <h2>Entrada a la web interna</h2>
          <p>Acceso a la plataforma de gestión de la falla.</p>
        </div>
      </section>

      <section class="login-card">
        <div class="block-header">
          <h3>Iniciar sesión</h3>
          <p>Introduce tus datos de acceso</p>
        </div>

        <form class="login-form" id="loginForm">
          <div class="form-group">
            <label for="tipoUsuario">Tipo de acceso</label>
            <select id="tipoUsuario" name="tipoUsuario">
              <option value="fallero">Fallero</option>
              <option value="admin">Administración</option>
            </select>
          </div>

          <div class="form-group">
            <label for="usuario">Usuario o correo</label>
            <input type="text" id="usuario" name="usuario" placeholder="Introduce tu usuario">
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="Introduce tu contraseña">
          </div>

          <p id="loginMessage" class="login-message"></p>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Entrar</button>
          </div>
        </form>

        <div class="login-footer-links">
          <a href="index.html">Volver al inicio</a>
        </div>
      </section>

    </div>
  </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js?v=10"></script>
<script src="js/app.js?v=10"></script>
</body>
</html>
